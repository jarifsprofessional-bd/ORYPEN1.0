<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Plantable Pen</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <img src="assets/logo.png" alt="Oryx Logo" class="logo">
    <h1>অর্ডার Plantable Eco Pen</h1>
  </header>

  <section class="order-form">
    <h2>Order Details</h2>
    <form action="https://wa.me/+8801409645165" method="get" target="_blank">
      <label>নাম:</label>
      <input type="text" name="name" required>
      
      <label>ঠিকানা:</label>
      <input type="text" name="address" required>
      
      <label>Quantity:</label>
      <select name="quantity">
        <option value="5">5 কলম</option>
        <option value="10">10 কলম</option>
      </select>

      <button type="submit">WhatsApp-এ অর্ডার পাঠান</button>
    </form>
  </section>

  <footer>
    <p>🌱 আজ একটি কলম কিনুন, আগামীকাল একটি গাছ লাগান</p>
  </footer>
</body>
</html>
