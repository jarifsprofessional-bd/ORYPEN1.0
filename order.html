  <!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>অর্ডার করুন</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>অর্ডার করুন</h1>
</header>

<section>
  <h2>আপনার তথ্য দিন</h2>

  <!-- 🔥 FORM DIRECT SUBMIT -->
  <form method="POST" action="https://script.google.com/macros/s/AKfycbyAIaPg9B0lJqkg6JmlFDVyzeoVnpTv9FKhz6qI5oSfm_eAVWiXQsWNLcfn_myevTck2w/exec">
    
    <input type="text" name="name" placeholder="নাম" required><br><br>
    <input type="tel" name="phone" placeholder="ফোন নাম্বার" required><br><br>

    <select name="division" required>
      <option value="">বিভাগ নির্বাচন করুন</option>
      <option>ঢাকা</option>
      <option>চট্টগ্রাম</option>
      <option>খুলনা</option>
      <option>রাজশাহী</option>
      <option>বরিশাল</option>
      <option>সিলেট</option>
      <option>রংপুর</option>
      <option>ময়মনসিংহ</option>
    </select><br><br>

    <input type="text" name="district" placeholder="জেলা" required><br><br>
    <input type="text" name="upazila" placeholder="উপজেলা" required><br><br>
    <input type="text" name="address" placeholder="বিস্তারিত ঠিকানা" required><br><br>

    <select name="product">
      <option>১২টি কলম (১৭৯ টাকা)</option>
      <option>২০টি কলম (২৯৯ টাকা)</option>
      <option>৪০টি কলম (৫৯৯ টাকা)</option>
      <option>১০০টি কলম (১৪৯৯ টাকা)</option>
    </select><br><br>

    <select name="payment" onchange="togglePayment()" id="payment">
      <option value="COD">Cash on Delivery</option>
      <option value="bKash">bKash</option>
    </select><br><br>

    <div id="paymentBox" style="display:none;">
      <p>📲 Payment Number: 01786706223 (bKash)</p>
      <input type="text" name="trx" placeholder="Transaction ID">
    </div>

    <button type="submit">অর্ডার করুন</button>

  </form>
</section>

<script>
function togglePayment(){
  var payment = document.getElementById("payment").value;
  var box = document.getElementById("paymentBox");

  if(payment === "COD"){
    box.style.display = "none";
  } else {
    box.style.display = "block";
  }
}
</script>

</body>
</html>
